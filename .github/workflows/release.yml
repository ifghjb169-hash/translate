name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: write
  attestations: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate Python source
        run: python -m py_compile translator_app.py

      - name: Install PyInstaller
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller

      - name: Build Windows executable
        run: pyinstaller --noconfirm --clean --onefile --windowed --icon app_icon.ico --add-data "app_icon.ico;." --name AI-Translate-Assistant translator_app.py

      - name: Package release artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release -Force | Out-Null
          Copy-Item "dist\AI-Translate-Assistant.exe" "release\AI-Translate-Assistant.exe"
          Copy-Item "README.md" "release\README.md"
          Compress-Archive -Path "release\*" -DestinationPath "dist\AI-Translate-Assistant-${env:GITHUB_REF_NAME}-win-x64.zip" -Force

      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'dist/AI-Translate-Assistant-${{ github.ref_name }}-win-x64.zip'

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/AI-Translate-Assistant-${{ github.ref_name }}-win-x64.zip
          generate_release_notes: true
